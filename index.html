<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>State of the Art - 3D Table Tennis</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container" class="hidden">
        <div class="score-board">
            <div id="player-name-display" class="name-display">DU</div>
            <div id="player-score" class="score">0</div>
            <div class="divider">:</div>
            <div id="ai-score" class="score">0</div>
            <div id="ai-name-display" class="name-display">KI</div>
        </div>
    </div>
    
    <div id="status-message" class="hidden">Tischtennis</div>
    <div id="game-container"></div>

    <!-- NEU: Das Menü & Karriere System -->
    <div id="menu-layer">
        <!-- Main Menu -->
        <div id="screen-main" class="screen active">
            <h1 class="game-title">PRO TABLE TENNIS</h1>
            <button class="btn" onclick="UI.showScreen('screen-setup')">Karriere Starten</button>
            <button class="btn" onclick="UI.showScreen('screen-exhibition')">Schnelles Spiel</button>
        </div>

        <!-- Exhibition Setup -->
        <div id="screen-exhibition" class="screen">
            <h2>Schnelles Spiel</h2>
            <select id="exhibition-difficulty" class="drop-down">
                <option value="0.2">Anfänger</option>
                <option value="0.6" selected>Profi</option>
                <option value="1.0">Gott</option>
            </select>
            <button class="btn" onclick="startExhibition()">Match Starten</button>
            <button class="btn" onclick="UI.showScreen('screen-main')">Zurück</button>
        </div>

        <!-- Career Setup -->
        <div id="screen-setup" class="screen">
            <h2>Erstelle deinen Spieler</h2>
            <input type="text" id="input-player-name" placeholder="Dein Name..." maxlength="15">
            <select id="input-career-difficulty" class="drop-down">
                <option value="0.7">Gegner-Level: Leicht</option>
                <option value="1.0" selected>Gegner-Level: Normal</option>
                <option value="1.3">Gegner-Level: Schwer</option>
            </select>
            <button class="btn" onclick="Career.startNew()">Karriere Beginnen</button>
            <button class="btn" onclick="UI.showScreen('screen-main')">Zurück</button>
        </div>

        <!-- Career Hub -->
        <div id="screen-hub" class="screen">
            <h2 id="hub-title">Spielerzentrale</h2>
            <div class="hub-stats">
                <p>Weltranglisten-Platz: <strong id="hub-rank">-</strong></p>
                <p>Punkte: <strong id="hub-points">0</strong></p>
                <p>Nächstes Event: <strong id="hub-event">-</strong></p>
            </div>
            <div class="hub-buttons">
                <button class="btn" onclick="Career.enterTournament()">Zum Turnier</button>
                <button class="btn" onclick="UI.showCalendar()">Saison-Kalender</button>
                <button class="btn" onclick="UI.showRankings()">Weltrangliste ansehen</button>
                <button class="btn" style="background:#b91c1c" onclick="UI.showScreen('screen-main')">Speichern & Beenden</button>
            </div>
        </div>

        <!-- Calendar -->
        <div id="screen-calendar" class="screen">
            <h2>Turnier-Kalender</h2>
            <div class="table-container">
                <table id="calendar-table">
                    <tr><th>Turnier</th><th>Punkte</th><th>Status</th></tr>
                </table>
            </div>
            <button class="btn" onclick="UI.showScreen('screen-hub')">Zurück</button>
        </div>

        <!-- Rankings -->
        <div id="screen-rankings" class="screen">
            <h2>Offizielle Weltrangliste</h2>
            <div class="table-container">
                <table id="rankings-table">
                    <tr><th>Rang</th><th>Name</th><th>Punkte</th></tr>
                </table>
            </div>
            <button class="btn" onclick="UI.showScreen('screen-hub')">Zurück</button>
        </div>

        <!-- Tournament Bracket -->
        <div id="screen-bracket" class="screen">
            <h2 id="bracket-title">Turnier</h2>
            <div id="bracket-view" class="bracket-container"></div>
            <button id="btn-next-match" class="btn" onclick="Career.playNextMatch()">Nächstes Spiel</button>
            <button id="btn-leave-tournament" class="btn hidden" onclick="UI.showScreen('screen-hub')">Turnier verlassen</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
