<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zelda-Style Soccer Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-wrapper">
        <div id="hud">
            <div class="hud-item">
                <span class="icon">🏆</span> 
                <span id="quest-display">Suche den Goldenen Ball der Weisheit!</span>
            </div>
            <div class="hud-item">
                <span class="icon">🧩</span> 
                <span id="puzzle-display">Rätsel gelöst: 0/3</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="dialog-box" class="hidden">
            <p id="dialog-text"></p>
            <p class="blink">Drücke Leertaste...</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
